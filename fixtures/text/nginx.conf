# nginx.conf — nginx server block fixture for plain-text path testing.
# Note: nginx config has no CodeMirror language mode — verifies backend
# plain-text code path. Open in editor; no syntax coloring should apply.

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log  notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    gzip  on;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    upstream filebrowser_app {
        server 127.0.0.1:58081;
        keepalive 16;
    }

    server {
        listen       58080;
        server_name  localhost;

        # Inject the bypass header so auth.py trusts requests without PAM
        location / {
            proxy_pass         http://filebrowser_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Authenticated-User root;
            proxy_read_timeout 3600;
        }

        # Rate-limited login endpoint
        location /api/auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://filebrowser_app;
            proxy_set_header Host $host;
        }

        # Static asset caching
        location ~* \.(js|css|png|jpg|gif|svg|ico|woff2?)$ {
            proxy_pass http://filebrowser_app;
            proxy_cache_valid 200 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        # Security headers
        add_header X-Frame-Options       DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection      "1; mode=block";
        add_header Referrer-Policy       strict-origin-when-cross-origin;

        error_page  404  /404.html;
        error_page  500 502 503 504  /50x.html;
    }
}
