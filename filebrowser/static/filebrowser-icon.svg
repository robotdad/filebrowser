<rect x="48" y="36" width="7" height="7" rx="1.5" fill="#06b6d4"/>
<!-- Row 3 -->
<rect x="26" y="47" width="7" height="7" rx="1.5" fill="#ec4899"/>
<rect x="37" y="47" width="7" height="7" rx="1.5" fill="#6b7280"/>
<rect x="48" y="47" width="7" height="7" rx="1.5" fill="#007AFF"/>

</g>
<defs>
