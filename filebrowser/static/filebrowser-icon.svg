  fill="white"/>

<!-- Header dot 1: Amber (dirty-state / tab indicator) -->
<circle cx="9.2654" cy="9.2654" r="2.917" fill="#FF9500"/>
<!-- Header dot 2: White (neutral) -->
<circle cx="18.5308" cy="9.2654" r="2.917" fill="white"/>
