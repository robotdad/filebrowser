<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip0_filebrowser_dark)">

<!-- Dark background fill -->
<path d="M61.2547 2.7453H2.7453V61.2547H61.2547V2.7453Z" fill="#0D1117"/>

<!-- Window chrome: outer border + header/body divider (evenodd rule) -->
