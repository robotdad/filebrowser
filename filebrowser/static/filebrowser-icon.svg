<rect x="7"  y="26" width="9" height="2" rx="1" fill="white" opacity="0.85"/>
<rect x="7"  y="32" width="7" height="2" rx="1" fill="white" opacity="0.55"/>
<rect x="9"  y="38" width="7" height="2" rx="1" fill="white" opacity="0.40"/>
<rect x="9"  y="44" width="5" height="2" rx="1" fill="white" opacity="0.30"/>

<!-- Divider between sidebar and content area -->
